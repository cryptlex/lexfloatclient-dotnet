name: Update version

on:
  workflow_dispatch:
    inputs:
      libraryVersion:
        description: 'Library Version'
        required: true
        default: ''
      packageVersion:
        description: 'Package Version'
        required: true
        default: ''

jobs:
  update-version:
    runs-on: ubuntu-latest
    env:
      LIBRARY_VERSION: ${{ github.event.inputs.libraryVersion }}
      PACKAGE_VERSION: ${{ github.event.inputs.packageVersion }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Package Version
        run: |
          sed -i -E 's/^([[:space:]]*<version>)[^<]+(<\/version>)/\1${{ env.PACKAGE_VERSION }}\2/' ./src/Cryptlex.LexFloatClient/Cryptlex.LexFloatClient.nuspec
      - name: Update Library Version
        run: |
          sed -i -E 's/^([[:space:]]*\$lexfloatclient_version[[:space:]]*=[[:space:]]*)"[^"]*"/\1"v${{ env.LIBRARY_VERSION }}"/' post-build.ps1

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: ci/${{ env.PACKAGE_VERSION }}
          title: "chore: bump package version to ${{ env.PACKAGE_VERSION }}"
          commit-message: "chore(package version): updated version"
          body: |
            Automated package version bump.
          base: master
          add-paths: |
            ./src/Cryptlex.LexFloatClient/Cryptlex.LexFloatClient.nuspec
            post-build.ps1