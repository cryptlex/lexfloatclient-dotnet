name: Build Cryptlex.LexFloatClient package

on:
  workflow_dispatch:

jobs: 
     
  build-publish:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v2
    - run: git pull origin master --ff-only

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1
      with:
        nuget-api-key: ${{ secrets.NUGET_API_KEY }}
        nuget-version: '5.8.1'
      
    - name: Restore NuGet Packages
      run: nuget restore Cryptlex.LexFloatClient.sln
      
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
    
    - name: Build Solution
      run: msbuild Cryptlex.LexFloatClient.sln /p:platform="Any CPU" /p:configuration="Release" /p:VisualStudioVersion="17.0"
    
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with: 
        credentials_json: ${{ secrets.GCP_KMS_SIGNER_KEY }}

    - name: Setup Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        version: 'latest'
        install_components: 'gcloud'

    - name: Run code signing script
      shell: powershell
      run: |
          .\code-sign.ps1 -SignType "dll"

    - name: Download Native Libs
      shell: powershell
      run: .\post-build.ps1
      
    - name: Pack NuGet Package
      run: nuget pack src\Cryptlex.LexFloatClient\Cryptlex.LexFloatClient.nuspec -NonInteractive -OutputDirectory nupkg -Properties Configuration=Release -Verbosity Detailed
    
    - name: Run NuGet package code signing script
      shell: powershell
      run: |
          .\code-sign.ps1 -SignType "nupkg"

    - name: Push NuGet Package
      run: nuget push nupkg\*.nupkg -SkipDuplicate -Source https://api.nuget.org/v3/index.json -NoSymbols

    - name: Extract version and create tag
      shell: bash
      run: |
        VERSION=$(sed -n 's/^[[:space:]]*<version>\([^<]*\)<\/version>.*/\1/p' src/Cryptlex.LexFloatClient/Cryptlex.LexFloatClient.nuspec)

        git tag "$VERSION" 2>/dev/null || echo "Tag already exists"
        git push origin "$VERSION" || true

    - name: Notify slack releases channel
      uses: slackapi/slack-github-action@v2
      with:
        webhook: ${{ secrets.SLACK_RELEASES_PROD_WEBHOOK_URL }}
        webhook-type: webhook-trigger
        payload: |
          status: "${{ job.status }}"
          environment: "PRODUCTION"
          project: "LexFloatClient Dotnet"
